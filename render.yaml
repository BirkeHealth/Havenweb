services:
  - type: web
    name: haven-health-insurance
    runtime: static
    buildCommand: ""
    staticPublishPath: ./
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
